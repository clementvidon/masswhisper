name: Static Deploy (fr-dev-job-market)

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

concurrency:
  group: static-deploy-fr-dev-job-market
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CI: true
      TOPIC_SLUG: fr-dev-job-market
      VITE_TOPIC_NAME: DevBarometer
      TOPIC_PROMPT_VARIANT: fr-dev-job-market-v1
      TOPIC_SOURCES_VARIANT: fr-dev-job-market-v1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build-shared

      - name: Materialize private topic config
        run: |
          prompt_bundle_path="$RUNNER_TEMP/prompt-${TOPIC_PROMPT_VARIANT}.json"
          cat > "$prompt_bundle_path" <<'EOF'
          ${{ secrets.FR_DEV_JOB_MARKET_PROMPT_BUNDLE_JSON }}
          EOF

          sources_bundle_path="$RUNNER_TEMP/sources-${TOPIC_SOURCES_VARIANT}.json"
          cat > "$sources_bundle_path" <<'EOF'
          ${{ secrets.FR_DEV_JOB_MARKET_SOURCES_JSON }}
          EOF

          echo "TOPIC_PROMPT_BUNDLE_PATH=$prompt_bundle_path" >> "$GITHUB_ENV"
          echo "TOPIC_SOURCES_BUNDLE_PATH=$sources_bundle_path" >> "$GITHUB_ENV"

      - name: Generate sentiment report
        run: npm --workspace backend run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}

      - name: Generate static JSON
        run: npm --workspace backend run generate-daily-bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build frontend
        run: npm --workspace frontend run predeploy

      - name: Configure Git identity
        run: |
          git config --global user.email "github-actions@users.noreply.github.com"
          git config --global user.name "github-actions"

      - name: Authenticate with GitHub token
        run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/clementvidon/masswhisper.git

      - name: Deploy to GitHub Pages
        run: npm --workspace frontend run deploy
